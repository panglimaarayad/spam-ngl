<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL SPAMMER UNGU - XYZ ALIEN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #4b0082, #8a2be2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .alien {
            text-align: center;
            font-size: 40px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: white;
            font-weight: 500;
            margin-top: 15px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: #2d1b3e;
            border: 1px solid #b77aff;
            border-radius: 24px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            font-family: monospace;
        }
        input:focus, textarea:focus {
            border-color: #ff66cc;
            box-shadow: 0 0 8px #ff66cc;
            background: #1e102c;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .row > div {
            flex: 1;
        }
        button {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: #ff44b0;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #9e2a6b;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9e2a6b;
        }
        .status {
            margin-top: 20px;
            background: #000000aa;
            border-radius: 20px;
            padding: 12px;
            color: #0f0;
            font-family: monospace;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #ffccff;
            font-size: 12px;
        }
        ::placeholder {
            color: #cba5ff;
            opacity: 0.7;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="alien">👽 XYZ ALIEN 👽</div>
    <h1>NGL SPAMMER UNGU</h1>
    <label>🔗 Username / Link Target (contoh: @bocil atau https://ngl.link/username)</label>
    <input type="text" id="target" placeholder="@bocil_keren atau username aja" value="">

    <label>💬 Isi Pesan (bisa pakai emoji)</label>
    <textarea id="pesan" placeholder="Tulis pesan spam disini... misal: LO SERBA SALAH BANGSAT!"></textarea>

    <div class="row">
        <div>
            <label>📦 Jumlah Pesan (00 = permanen 🔁)</label>
            <input type="text" id="jumlah" value="10" placeholder="00 atau angka">
        </div>
        <div>
            <label>⏱️ Delay (ms)</label>
            <input type="number" id="delay" value="500" placeholder="milidetik">
        </div>
    </div>

    <button id="startBtn">🚀 MULAI SPAM NGL 👽</button>
    <button id="stopBtn" style="background:#444; margin-top:10px; box-shadow:none;">⏹️ STOP SPAM</button>

    <div class="status" id="logArea">
        [●] Siap menjalankan perintah King Angzz...
    </div>
    <div class="footer">POWERED BY @KINGANGZZ</div>
</div>

<script>
    let isSpamming = false;
    let stopRequested = false;
    let currentInterval = null;

    // Fungsi ekstrak username dari NGL
    function extractUsername(input) {
        let clean = input.trim();
        if (clean.includes("ngl.link/")) {
            let split = clean.split("ngl.link/");
            let user = split[split.length-1].split("?")[0].split("#")[0];
            return user;
        }
        if (clean.startsWith("@")) {
            return clean.substring(1);
        }
        return clean;
    }

    async function sendSpam(targetUser, message, delayMs, maxCount, logElement) {
        // Endpoint NGL yang asli (API terbaru)
        const url = "https://ngl.link/api/submit";
        let sent = 0;
        let failed = 0;
        
        // Kalau maxCount = 0 (00) -> loop sampe stop manual
        let isInfinite = (maxCount === 0);
        let loopCount = 0;
        
        while (isSpamming && (isInfinite || loopCount < maxCount)) {
            if (stopRequested) break;
            
            const payload = new URLSearchParams();
            payload.append("username", targetUser);
            payload.append("question", message);
            payload.append("deviceId", "xyz_alien_" + Date.now() + Math.random());
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "User-Agent": "Mozilla/5.0 (Linux; Android 13) XYZ Alien Bot"
                    },
                    body: payload.toString()
                });
                
                const result = await response.json();
                if (response.ok && result.status === "success") {
                    sent++;
                    logElement.innerHTML = `[✓] Pesan ke-${loopCount+1} terkirim ke @${targetUser} | Sukses: ${sent}, Gagal: ${failed}<br>` + logElement.innerHTML;
                } else {
                    failed++;
                    logElement.innerHTML = `[✗] Gagal kirim! Mungkin kena rate limit atau username salah. (${result.message || "error"})<br>` + logElement.innerHTML;
                }
            } catch (err) {
                failed++;
                logElement.innerHTML = `[⚠️] Error network: ${err.message}<br>` + logElement.innerHTML;
            }
            
            // trim log biar ga numpuk gila-gilaan
            if (logElement.children.length > 35) {
                while(logElement.children.length > 30) logElement.removeChild(logElement.lastChild);
            }
            
            loopCount++;
            if (!isInfinite && loopCount >= maxCount) break;
            
            await new Promise(resolve => setTimeout(resolve, delayMs));
        }
        
        if (stopRequested) {
            logElement.innerHTML = `[⏸️] SPAM DIHENTIKAN MANUAL. Total terkirim: ${sent}, gagal: ${failed}<br>` + logElement.innerHTML;
        } else {
            logElement.innerHTML = `[🏁] SPAM SELESAI. Total sukses: ${sent}, gagal: ${failed}<br>` + logElement.innerHTML;
        }
        isSpamming = false;
        stopRequested = false;
    }
    
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const logArea = document.getElementById("logArea");
    const targetInput = document.getElementById("target");
    const pesanInput = document.getElementById("pesan");
    const jumlahInput = document.getElementById("jumlah");
    const delayInput = document.getElementById("delay");
    
    startBtn.addEventListener("click", async () => {
        if (isSpamming) {
            logArea.innerHTML = "[⚠️] Masih ada spam yang jalan! STOP dulu atau tunggu selesai.<br>" + logArea.innerHTML;
            return;
        }
        
        let targetRaw = targetInput.value.trim();
        let pesan = pesanInput.value.trim();
        let jumlahRaw = jumlahInput.value.trim();
        let delayMs = parseInt(delayInput.value);
        
        if (!targetRaw) {
            logArea.innerHTML = "[❌] GOBLOK! Username/link target kosong!<br>" + logArea.innerHTML;
            return;
        }
        if (!pesan) {
            logArea.innerHTML = "[❌] Pesan spam ga boleh kosong, tai!<br>" + logArea.innerHTML;
            return;
        }
        if (isNaN(delayMs) || delayMs < 50) {
            delayMs = 500;
            logArea.innerHTML = "[⚠️] Delay gak valid, pake default 500ms<br>" + logArea.innerHTML;
        }
        
        let jumlah = parseInt(jumlahRaw);
        if (isNaN(jumlah)) jumlah = 10;
        if (jumlahRaw === "00" || jumlahRaw === "0") jumlah = 0; // 0 = infinite
        
        const username = extractUsername(targetRaw);
        if (!username) {
            logArea.innerHTML = "[❌] Gagal ekstrak username. Contoh: @ngl_users atau ngl.link/anjay<br>" + logArea.innerHTML;
            return;
        }
        
        logArea.innerHTML = `[🚀] MULAI SPAM ke @${username} | Jumlah: ${jumlah === 0 ? "♾️ PERMANEN (stop manual)" : jumlah} | Delay: ${delayMs}ms<br>` + logArea.innerHTML;
        
        isSpamming = true;
        stopRequested = false;
        try {
            await sendSpam(username, pesan, delayMs, jumlah, logArea);
        } catch(e) {
            logArea.innerHTML = "[💀] CRASH BANGSAT: " + e.message + "<br>" + logArea.innerHTML;
            isSpamming = false;
        }
    });
    
    stopBtn.addEventListener("click", () => {
        if (!isSpamming) {
            logArea.innerHTML = "[⚠️] Gak ada spam yang berjalan, santai kontol!<br>" + logArea.innerHTML;
            return;
        }
        stopRequested = true;
        isSpamming = false;
        logArea.innerHTML = "[🛑] Menghentikan spam... tunggu sebentar.<br>" + logArea.innerHTML;
    });
</script>
</body>
</html>
